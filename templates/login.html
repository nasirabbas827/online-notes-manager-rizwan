{% extends 'base.html' %}
{% block title %}Login{% endblock %}
{% block content %}
<div class="container mt-5">

        <div class="card mx-auto" style="max-width: 500px;">
        <div class="card-body">
<h2 class="mb-4 text-center"><i class="fas fa-sign-in-alt"></i> Login</h2>

{% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}
        {% for category, message in messages %}
            <div class="alert alert-{{ category }} alert-dismissible fade show" role="alert">
                {{ message }}
                <button type="button" class="close" data-dismiss="alert" aria-label="Close">
                    <span aria-hidden="true">&times;</span>
                </button>
            </div>
        {% endfor %}
    {% endif %}
{% endwith %}


<form id="loginForm" method="POST">
    <div class="form-group mb-3">
        <label for="username"><i class="fas fa-user"></i> Username</label>
        <input type="text" class="form-control" id="username" name="username" placeholder="Enter your username" required>
    </div>
    <div class="form-group mb-4">
        <label for="password"><i class="fas fa-lock"></i> Password</label>
        <input type="password" class="form-control" id="password" name="password" placeholder="Enter your password" required>
    </div>
    <div class="d-flex justify-content-between">
        <button type="submit" class="btn btn-primary px-4"><i class="fas fa-sign-in-alt"></i> Login</button>
        <a href="{{ url_for('register') }}" class="btn btn-secondary px-4"><i class="fas fa-user-plus"></i> Register</a>
    </div>
</form>
    </div>
    </div>


<script>
document.getElementById('loginForm').addEventListener('submit', function(e) {
    e.preventDefault();
    const formData = new FormData(this);
    fetch('/user/login', {
        method: 'POST',
        body: formData
    }).then(res => res.json())
      .then(data => {
          if (data.status === 'success') {
              // Sync guest notes after login
              const notes = JSON.parse(localStorage.getItem('guestNotes') || '[]');
              if (notes.length > 0) {
                  fetch('/notes/sync', {
                      method: 'POST',
                      headers: { 'Content-Type': 'application/json' },
                      body: JSON.stringify({ notes })
                  }).then(res => res.json())
                    .then(syncData => {
                        if (syncData.status === 'success') {
                            localStorage.removeItem('guestNotes');
                            window.location.href = data.redirect;
                        }
                    });
              } else {
                  window.location.href = data.redirect;
              }
          } else {
              alert(data.message || 'Login failed. Please check your credentials.');
          }
      });
});
</script>
{% endblock %}
