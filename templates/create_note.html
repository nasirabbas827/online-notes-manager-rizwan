{% extends 'base.html' %}
{% block title %}Create Note{% endblock %}
{% block content %}
<div class="container mt-4">
<h2 class="text-center mb-4"><i class="fas fa-pencil-alt"></i> Create New Note</h2>

<!-- Auto-save message -->
<div id="autosaveMessage" class="alert alert-success" style="display:none; position: fixed; top: 10px; right: 10px; z-index: 1050;">
    <i class="fas fa-save"></i> Note auto-saved!
</div>

<!-- Note Form -->
<div class="card shadow-lg mx-auto" style="max-width: 800px;">
    <div class="card-header bg-info text-white">
        <i class="fas fa-sticky-note"></i> New Note Details
    </div>
    <div class="card-body bg-light">
        <input type="hidden" id="noteId" value="{{ draft_note[0] if draft_note else '' }}">

        <div class="form-group">
            <label for="title"><i class="fas fa-heading"></i> Title</label>
            <input type="text" id="title" class="form-control" placeholder="Enter note title here..." value="{{ draft_note[2] if draft_note else '' }}">
        </div>

        <div class="form-group">
            <label for="content"><i class="fas fa-align-left"></i> Content</label>
            <textarea id="content" class="form-control" rows="8" placeholder="Write your note here...">{{ draft_note[3] if draft_note else '' }}</textarea>
        </div>

        <div class="form-group">
            <label for="category"><i class="fas fa-tags"></i> Category</label>
            <select id="category" class="form-control">
                <option {% if draft_note and draft_note[4] == 'Work' %}selected{% endif %}>Work</option>
                <option {% if draft_note and draft_note[4] == 'Personal' %}selected{% endif %}>Personal</option>
                <option {% if draft_note and draft_note[4] == 'Study' %}selected{% endif %}>Study</option>
                <option {% if draft_note and draft_note[4] == 'Miscellaneous' %}selected{% endif %}>Miscellaneous</option>
            </select>
        </div>

        <div class="form-check mb-3">
            <input class="form-check-input" type="checkbox" id="isPinned" {% if draft_note and draft_note[5] %}checked{% endif %}>
            <label class="form-check-label" for="isPinned">
                <i class="fas fa-thumbtack"></i> Pin this note
            </label>
        </div>

        <div class="d-flex justify-content-between">
            <button class="btn btn-success" onclick="saveNote()">
                <i class="fas fa-save"></i> Save Note
            </button>
            <a href="{{ url_for('dashboard') }}" class="btn btn-secondary">
                <i class="fas fa-arrow-left"></i> Back to Dashboard
            </a>
        </div>
    </div>
</div>


<script>
let autoSaveInterval = setInterval(() => {
    saveNote(true);
}, 5000);

function saveNote(auto=false) {
    const noteId = document.getElementById('noteId').value;
    const title = document.getElementById('title').value.trim();
    const content = document.getElementById('content').value.trim();
    const category = document.getElementById('category').value;
    const isPinned = document.getElementById('isPinned').checked;

    if (!title && !content) return; // Skip empty autosaves

    const url = noteId ? `/notes/update/${noteId}` : '/notes/create';
    const method = 'POST';

    fetch(url, {
        method: method,
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ title, content, category, isPinned, isDraft: auto })
    }).then(res => res.json())
      .then(data => {
          if (data.status === 'success' && data.note_id) {
              document.getElementById('noteId').value = data.note_id; // Update noteId for future autosaves
          }
          if (!auto) {
              // Redirect to dashboard on manual save
              window.location.href = '/dashboard';
          } else {
              // Show autosave message
              const msg = document.getElementById('autosaveMessage');
              msg.style.display = 'block';
              setTimeout(() => {
                  msg.style.display = 'none';
              }, 2000);
          }
      });
}
</script>
{% endblock %}
