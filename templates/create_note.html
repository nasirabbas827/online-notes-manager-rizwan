{% extends 'base.html' %}
{% block title %}Create Note{% endblock %}
{% block content %}
<div class="container my-5">
    <!-- Header -->
    <div class="text-center mb-5">
        <h2 class="display-5 fw-bold"><i class="fas fa-pencil-alt me-2"></i>Create New Note</h2>
        <p class="text-muted">Capture your thoughts and ideas effortlessly.</p>
    </div>

    <!-- Auto-save message -->
    <div id="autosaveMessage" class="alert alert-success" style="display:none; position: fixed; top: 1rem; right: 1rem; z-index: 1050; min-width: 200px;">
        <i class="fas fa-save me-2"></i>Note auto-saved!
    </div>

    <!-- Note Form -->
    <div class="card shadow-lg mx-auto border-0" style="max-width: 800px;">
        <div class="card-header bg-primary text-white py-3">
            <h3 class="h5 mb-0"><i class="fas fa-sticky-note me-2"></i>New Note Details</h3>
        </div>
        <div class="card-body p-4">
            <form>
                <input type="hidden" id="noteId" value="{{ draft_note.id if draft_note else '' }}">
                <div class="mb-4">
                    <label for="title" class="form-label"><i class="fas fa-heading me-2"></i>Title</label>
                    <input type="text" id="title" class="form-control form-control-lg" placeholder="Enter note title" value="{{ draft_note.title if draft_note else '' }}">
                </div>
                <div class="mb-4">
                    <label for="content" class="form-label"><i class="fas fa-align-left me-2"></i>Content</label>
                    <textarea id="content" class="form-control" rows="8" placeholder="Write your note here">{{ draft_note.content if draft_note else '' }}</textarea>
                </div>
                <div class="mb-4">
                    <label for="category" class="form-label"><i class="fas fa-tags me-2"></i>Category</label>
                    <select id="category" class="form-select">
                        <option {% if draft_note and draft_note.category == 'Work' %}selected{% endif %}>Work</option>
                        <option {% if draft_note and draft_note.category == 'Personal' %}selected{% endif %}>Personal</option>
                        <option {% if draft_note and draft_note.category == 'Study' %}selected{% endif %}>Study</option>
                        <option {% if draft_note and draft_note.category == 'Miscellaneous' %}selected{% endif %}>Miscellaneous</option>
                    </select>
                </div>
                <div class="form-check mb-4">
                    <input class="form-check-input" type="checkbox" id="isPinned" {% if draft_note and draft_note.isPinned %}checked{% endif %}>
                    <label class="form-check-label" for="isPinned">
                        <i class="fas fa-thumbtack me-2"></i>Pin this note
                    </label>
                </div>
                <div class="d-flex justify-content-between align-items-center">
                    <button type="button" class="btn btn-primary btn-lg px-4" onclick="saveNote()">
                        <i class="fas fa-save me-2"></i>Save Note
                    </button>
                    <a href="{{ url_for('dashboard') }}" class="btn btn-outline-secondary btn-lg px-4">
                        <i class="fas fa-arrow-left me-2"></i>Back to Dashboard
                    </a>
                </div>
            </form>
        </div>
    </div>
</div>

<script>
let autoSaveInterval = setInterval(() => {
    saveNote(true);
}, 5000);

function saveNote(auto=false) {
    const noteId = document.getElementById('noteId').value;
    const title = document.getElementById('title').value.trim();
    const content = document.getElementById('content').value.trim();
    const category = document.getElementById('category').value;
    const isPinned = document.getElementById('isPinned').checked;

    if (!title && !content) return; // Skip empty autosaves

    const url = noteId ? `/notes/update/${noteId}` : '/notes/create';
    const method = 'POST';

    fetch(url, {
        method: method,
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ title, content, category, isPinned, isDraft: auto })
    }).then(res => res.json())
      .then(data => {
          if (data.status === 'success' && data.note_id) {
              document.getElementById('noteId').value = data.note_id; // Update noteId for future autosaves
          }
          if (!auto) {
              // Redirect to dashboard on manual save
              window.location.href = '/dashboard';
          } else {
              // Show autosave message
              const msg = document.getElementById('autosaveMessage');
              msg.style.display = 'block';
              setTimeout(() => {
                  msg.style.display = 'none';
              }, 2000);
          }
      });
}
</script>
{% endblock %}
