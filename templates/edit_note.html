{% extends 'base.html' %}
{% block title %}Edit Note{% endblock %}
{% block content %}
<div class="container my-5">
    <!-- Header -->
    <div class="text-center mb-5">
        <h2 class="display-5 fw-bold"><i class="fas fa-pencil-alt me-2"></i>Edit Note</h2>
        <p class="text-muted">Update your note with ease.</p>
    </div>

    <!-- Note Form -->
    <div class="card shadow-lg mx-auto border-0" style="max-width: 800px;">
        <div class="card-header bg-primary text-white py-3">
            <h3 class="h5 mb-0"><i class="fas fa-sticky-note me-2"></i>Modify Note Details</h3>
        </div>
        <div class="card-body p-4">
            <form onsubmit="updateNote(event)">
                <input type="hidden" id="noteId" value="{{ note.id }}">
                <div class="mb-4">
                    <label for="title" class="form-label"><i class="fas fa-heading me-2"></i>Title</label>
                    <input type="text" id="title" class="form-control form-control-lg" placeholder="Enter note title" value="{{ note.title }}">
                </div>
                <div class="mb-4">
                    <label for="content" class="form-label"><i class="fas fa-align-left me-2"></i>Content</label>
                    <textarea id="content" class="form-control" rows="8" placeholder="Write your note here">{{ note.content }}</textarea>
                </div>
                <div class="mb-4">
                    <label for="category" class="form-label"><i class="fas fa-tags me-2"></i>Category</label>
                    <select id="category" class="form-select">
                        <option {% if note.category == 'Work' %}selected{% endif %}>Work</option>
                        <option {% if note.category == 'Personal' %}selected{% endif %}>Personal</option>
                        <option {% if note.category == 'Study' %}selected{% endif %}>Study</option>
                        <option {% if note.category == 'Miscellaneous' %}selected{% endif %}>Miscellaneous</option>
                    </select>
                </div>
                <div class="form-check mb-4">
                    <input class="form-check-input" type="checkbox" id="isPinned" {% if note.isPinned %}checked{% endif %}>
                    <label class="form-check-label" for="isPinned">
                        <i class="fas fa-thumbtack me-2"></i>Pin this note
                    </label>
                </div>
                <div class="d-flex justify-content-between align-items-center">
                    <button type="submit" class="btn btn-primary btn-lg px-4">
                        <i class="fas fa-save me-2"></i>Update Note
                    </button>
                    <a href="{{ url_for('dashboard') }}" class="btn btn-outline-secondary btn-lg px-4">
                        <i class="fas fa-arrow-left me-2"></i>Back to Dashboard
                    </a>
                </div>
            </form>
        </div>
    </div>
</div>

<script>
function updateNote(e) {
    e.preventDefault();
    fetch('/notes/update/{{ note.id }}', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
            title: document.getElementById('title').value,
            content: document.getElementById('content').value,
            category: document.getElementById('category').value,
            isPinned: document.getElementById('isPinned').checked
        })
    }).then(res => res.json())
      .then(data => window.location.href = "/dashboard");
}
</script>
{% endblock %}
