{% extends 'base.html' %}
{% block title %}Edit Note{% endblock %}
{% block content %}
<div class="container mt-5">
<h2 class="text-center mb-4"><i class="fas fa-edit"></i> Edit Note</h2>

<form onsubmit="updateNote(event)">
    <div class="card shadow-lg mx-auto" style="max-width: 800px;">
        <div class="card-header bg-warning text-dark">
            <i class="fas fa-pencil-alt"></i> Modify Your Note
        </div>
        <div class="card-body bg-light">

            <div class="form-group">
                <label for="title"><i class="fas fa-heading"></i> Title</label>
                <input type="text" id="title" class="form-control" value="{{ note[2] }}">
            </div>

            <div class="form-group">
                <label for="content"><i class="fas fa-align-left"></i> Content</label>
                <textarea id="content" class="form-control" rows="8">{{ note[3] }}</textarea>
            </div>

            <div class="form-group">
                <label for="category"><i class="fas fa-tags"></i> Category</label>
                <select id="category" class="form-control">
                    <option {% if note[4] == 'Work' %}selected{% endif %}>Work</option>
                    <option {% if note[4] == 'Personal' %}selected{% endif %}>Personal</option>
                    <option {% if note[4] == 'Study' %}selected{% endif %}>Study</option>
                    <option {% if note[4] == 'Miscellaneous' %}selected{% endif %}>Miscellaneous</option>
                </select>
            </div>

            <div class="form-check mb-3">
                <input class="form-check-input" type="checkbox" id="isPinned" {% if note[5] %}checked{% endif %}>
                <label class="form-check-label" for="isPinned">
                    <i class="fas fa-thumbtack"></i> Pin this note
                </label>
            </div>

            <div class="d-flex justify-content-end">
                <button class="btn btn-success">
                    <i class="fas fa-save"></i> Update Note
                </button>
            </div>
        </div>
    </div>
</form>


<script>
function updateNote(e) {
    e.preventDefault();
    fetch('/notes/update/{{ note[0] }}', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
            title: document.getElementById('title').value,
            content: document.getElementById('content').value,
            category: document.getElementById('category').value,
            isPinned: document.getElementById('isPinned').checked
        })
    }).then(res => res.json())
      .then(data => window.location.href = "/dashboard");
}
</script>
{% endblock %}
